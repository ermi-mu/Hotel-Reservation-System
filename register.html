<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Grand Hotel</title>
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <i class="fas fa-hotel"></i>
        </div>
        <h2>Create Account</h2>
        <p>Join Grand Hotel today</p>
      </div>

      <div class="auth-body">
        <form id="registerForm" class="auth-form">
          <div id="registerMessage" class="alert" style="display: none"></div>

          <div class="form-group">
            <label for="fullName" class="form-label">Full Name</label>
            <div class="input-with-icon">
              <i class="fas fa-user"></i>
              <input type="text" id="fullName" class="form-control" required />
            </div>
          </div>

          <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <div class="input-with-icon">
              <i class="fas fa-envelope"></i>
              <input type="email" id="email" class="form-control" required />
            </div>
          </div>

          <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <div class="input-with-icon">
              <i class="fas fa-at"></i>
              <input type="text" id="username" class="form-control" required />
            </div>
          </div>

          <div class="form-group">
            <label for="phone" class="form-label">Phone Number</label>
            <div class="input-with-icon">
              <i class="fas fa-phone"></i>
              <input type="tel" id="phone" class="form-control" />
            </div>
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <div class="input-with-icon">
              <i class="fas fa-lock"></i>
              <input type="password" id="password" class="form-control" required />
            </div>
            <div class="password-strength">
              <div class="strength-bar">
                <div class="strength-level" id="strengthLevel"></div>
              </div>
              <div class="strength-text" id="strengthText">
                Password strength
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="confirmPassword" class="form-label">Confirm Password</label>
            <div class="input-with-icon">
              <i class="fas fa-lock"></i>
              <input type="password" id="confirmPassword" class="form-control" required />
            </div>
          </div>


          <div class="terms">
            <input type="checkbox" id="terms" required />
            <label for="terms">I agree to the <a href="#">Terms of Service</a> and
              <a href="#">Privacy Policy</a></label>
          </div>

          <button type="submit" class="auth-btn" id="registerBtn">
            <span>Create Account</span>
          </button>

          <div class="auth-social">
            <div class="social-divider">
              <span>Or sign up with</span>
            </div>
            <div class="social-buttons">
              <button type="button" class="social-btn" id="googleLoginBtn">
                <i class="fab fa-google"></i> Google
              </button>
              <button type="button" class="social-btn" id="facebookLoginBtn">
                <i class="fab fa-facebook"></i> Facebook
              </button>
            </div>
          </div>
        </form>
      </div>

      <div class="auth-footer">
        <p>Already have an account? <a href="login.php">Sign in</a></p>
      </div>
    </div>
  </div>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Facebook SDK -->
  <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js"></script>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
